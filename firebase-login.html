<!DOCTYPE html>
<html>
<head>
  <title>Firebase Google Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
</head>
<body>

<h2>Firebase Google Login </h2>
<button onclick="login()">Login with Google</button>
<button onclick="logout()">Logout</button>

<div id="user"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQeCqzgvbJ1r2Ek0g5YqRgdiqm4uyHPVY",
  authDomain: "rohitsharma-ddda2.firebaseapp.com",
  projectId: "rohitsharma-ddda2",
  appId: "1:393765561274:web:ac4236c015d0e49e35f383"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = function() {
  signInWithPopup(auth, provider)
    .then(result => {
      const user = result.user;
      document.getElementById("user").innerHTML =
        `<img src="${user.photoURL}" width="100"><br>
         Name: ${user.displayName}<br>
         Email: ${user.email}`;
    });
}

window.logout = function() {
  signOut(auth);
  document.getElementById("user").innerHTML = "";
}

</script>

</body>
</html
